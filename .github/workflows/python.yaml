name: Python
env:
  WORKING_DIRECTORY: bindings/python

on:
  push:
    branches:
      - master
    tags-ignore:
      - '**'
    paths:
      - 'bindings/python/**'
      - 'core/**'
      - 'test-data/**'
      - '.github/workflows/python.yaml'
  pull_request:
    paths:
      - 'bindings/python/**'
      - 'core/**'
      - 'test-data/**'
      - '.github/workflows/python.yaml'
  # Stable publish is driven by the GitHub Release that release-please creates
  # for the `python` component (tag `python-v<version>`).
  release:
    types: [ published ]

permissions:
  contents: read

jobs:
  # The build jobs skip on release events for other components (release-please fires
  # one `release` event per component; only `python-v*` should build/publish here).
  wheels:
    if: "github.event_name != 'release' || startsWith(github.event.release.tag_name, 'python-v')"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Per-platform maturin config lives in the matrix rows (steps stay uniform).
      # Linux builds on the host via zig; win/mac build natively (uncached for now).
      # NOTE: linux aarch64 is non-abi3, so it needs the target Python — if it fails
      # under zig, switch it to abi3 or keep it on the manylinux container.
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            target: x86_64
            args: --release --out dist --find-interpreter -m bindings/python/Cargo.toml --zig --compatibility manylinux_2_28
            manylinux: auto
          - os: ubuntu-latest
            platform: linux
            target: aarch64
            args: --release --out dist --find-interpreter -m bindings/python/Cargo.toml --zig --compatibility manylinux_2_28
            manylinux: auto
          - os: windows-latest
            platform: windows
            target: x64
            architecture: x64
            args: --release --out dist --find-interpreter -m bindings/python/Cargo.toml
          - os: macos-latest
            platform: macos
            target: x86_64
            args: --release --out dist --find-interpreter -m bindings/python/Cargo.toml
          - os: macos-latest
            platform: macos
            target: aarch64
            args: --release --out dist --find-interpreter -m bindings/python/Cargo.toml
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          architecture: ${{ matrix.architecture }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ matrix.args }}
          manylinux: ${{ matrix.manylinux || 'auto' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}-${{ matrix.target }}
          path: dist

  sdist:
    if: "github.event_name != 'release' || startsWith(github.event.release.tag_name, 'python-v')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    # Publishes only on the release-please GitHub Release for the python component.
    if: "github.event_name == 'release' && startsWith(github.event.release.tag_name, 'python-v')"
    needs: [ wheels, sdist ]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing *
