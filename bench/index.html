<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZEN Engine — cross-language benchmarks</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2230; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --rust: #ff8a4c; --node: #6cc24a; --python: #5b9bd5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 16px 72px; }
  header h1 { font-size: 20px; margin: 0 0 4px; font-weight: 650; letter-spacing: -0.2px; }
  .sub { color: var(--muted); font-size: 13px; }
  .sub a { color: var(--accent); text-decoration: none; }
  .sub a:hover { text-decoration: underline; }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center;
    margin: 22px 0 16px; padding: 12px 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  }
  .group { display: flex; align-items: center; gap: 8px; }
  .group > .lbl { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .seg { display: inline-flex; background: var(--panel2); border: 1px solid var(--border); border-radius: 9px; padding: 2px; }
  .seg button {
    appearance: none; border: 0; background: transparent; color: var(--muted);
    font: inherit; font-size: 13px; padding: 5px 11px; border-radius: 7px; cursor: pointer;
  }
  .seg button.active { background: var(--accent); color: #0d1117; font-weight: 600; }
  select {
    appearance: none; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 9px; padding: 6px 28px 6px 10px; font: inherit; cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238b949e' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 10px center;
  }
  .spacer { flex: 1 1 auto; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend span { color: var(--muted); font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .chart-box { position: relative; width: 100%; }
  canvas { width: 100% !important; }

  table { width: 100%; border-collapse: collapse; margin-top: 22px; font-variant-numeric: tabular-nums; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--bg); }
  td:first-child, th:first-child { text-align: left; }
  .x { color: var(--muted); font-size: 12px; }
  .na { color: var(--muted); }
  footer { color: var(--muted); font-size: 12px; margin-top: 22px; }
  .empty { color: var(--muted); padding: 56px 16px; text-align: center; }
  .table-scroll { overflow-x: auto; }
  #mobileSnap { display: none; }
  .fx { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .fx-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; word-break: break-word; }
  .fx-title .kind { color: var(--muted); font-weight: 400; }
  .rowbar { display: grid; grid-template-columns: 44px 1fr auto; align-items: center; gap: 8px; margin: 6px 0; }
  .rl { color: var(--muted); font-size: 12px; }
  .track { background: var(--panel2); border-radius: 5px; height: 18px; overflow: hidden; }
  .fill { height: 100%; border-radius: 5px; min-width: 2px; }
  .rv { font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }

  @media (max-width: 640px) {
    .wrap { padding: 16px 6px 56px; }
    .card { padding: 12px 6px 12px 2px; }
    .toolbar { gap: 10px; padding: 12px; }
    .group { flex: 1 1 100%; justify-content: space-between; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>ZEN Engine — cross-language benchmarks</h1>
    <div class="sub" id="sub"></div>
  </header>

  <div class="toolbar" id="toolbar" hidden>
    <div class="group">
      <span class="lbl">view</span>
      <span class="seg" id="view">
        <button data-v="snapshot" class="active">Snapshot</button>
        <button data-v="timeline">Timeline</button>
      </span>
    </div>
    <div class="group">
      <span class="lbl">trace</span>
      <span class="seg" id="trace">
        <button data-t="0" class="active">off</button>
        <button data-t="1">on</button>
      </span>
    </div>
    <div class="group">
      <span class="lbl">metric</span>
      <select id="metric">
        <option value="us">µs/op</option>
        <option value="rel">× rust</option>
      </select>
    </div>
    <div class="group" id="pickWrap"></div>
  </div>

  <div class="card chart-box" id="chartCard"><canvas id="chart"></canvas></div>
  <div id="mobileSnap"></div>
  <div class="table-scroll"><table id="table"></table></div>
  <footer>rust is the baseline floor — lower is better. <span id="foot"></span></footer>
</div>

<script src="../dev/bench/data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
(function () {
  const root = document.querySelector(".wrap");
  const D = window.BENCHMARK_DATA;
  if (!D || !D.entries) {
    root.innerHTML = '<p class="empty">No benchmark data found at <code>../dev/bench/data.js</code>.<br>Run the benchmark workflow first.</p>';
    return;
  }
  const suite = D.entries["ZEN cross-language"] || Object.values(D.entries)[0] || [];
  if (!suite.length) { root.innerHTML = '<p class="empty">No runs recorded yet.</p>'; return; }

  const LANGS = ["rust", "node", "python"];
  const C = { rust: getCss("--rust"), node: getCss("--node"), python: getCss("--python") };
  const MUTED = getCss("--muted"), GRID = "#21262d";
  function getCss(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

  const parse = (n) => {
    const i = n.indexOf(" · ");
    let rest = n.slice(i + 3);
    const trace = rest.endsWith(" +trace");
    if (trace) rest = rest.slice(0, -7);
    return { lang: n.slice(0, i), file: rest, trace };
  };
  const rowsCache = new WeakMap();
  const rowsOf = (e) => {
    if (!rowsCache.has(e)) rowsCache.set(e, e.benches.map((b) => ({ ...parse(b.name), value: b.value / 1000 })));
    return rowsCache.get(e);
  };
  const valIn = (e, file, lang, trace) => {
    const r = rowsOf(e).find((x) => x.file === file && x.lang === lang && x.trace === trace);
    return r ? r.value : null;
  };

  const order = suite.map((_, i) => i).reverse();
  const chrono = suite.map((_, i) => i);
  const latest = suite[suite.length - 1];
  const files = [];
  for (const r of rowsOf(latest)) if (!files.includes(r.file)) files.push(r.file);

  const shortSha = (e) => (e.commit && e.commit.id ? e.commit.id.slice(0, 7) : "—");
  const branchOf = (e) => e.commit && (e.commit.ref || e.commit.branch) ? String(e.commit.ref || e.commit.branch).replace("refs/heads/", "") : "";
  const dateOf = (e) => (e.date ? new Date(e.date) : null);

  const state = { view: "snapshot", trace: false, metric: "us", commit: suite.length - 1, file: files[0] };

  const sub = document.getElementById("sub");
  sub.innerHTML =
    `${suite.length} run${suite.length > 1 ? "s" : ""} · ${files.length} fixtures · ` +
    `latest <a href="${(latest.commit || {}).url || "#"}">${shortSha(latest)}</a> ` +
    `${dateOf(latest) ? dateOf(latest).toLocaleString() : ""} · ` +
    `<a href="../dev/bench/">regression history →</a>`;
  document.getElementById("toolbar").hidden = false;

  function relBase(e, file, trace) { return valIn(e, file, "rust", trace); }
  function metricVal(raw, base, metric) {
    if (raw == null) return null;
    if (metric === "rel") return base ? raw / base : null;
    return raw;
  }

  let chart;
  function draw() {
    const ctx = document.getElementById("chart");
    const card = document.getElementById("chartCard");
    const msnap = document.getElementById("mobileSnap");
    if (chart) { chart.destroy(); chart = null; }
    if (state.view === "snapshot" && window.matchMedia("(max-width: 640px)").matches) {
      card.style.display = "none";
      msnap.style.display = "block";
      drawMobileSnap(suite[state.commit]);
      return;
    }
    card.style.display = "";
    msnap.style.display = "none";
    const log = state.metric === "us";
    const yTitle = log ? "µs/op" : "× rust";

    if (state.view === "snapshot") {
      const e = suite[state.commit];
      sizeBox(files.length * 62 + 120);
      const datasets = LANGS.map((lang) => ({
        label: lang,
        backgroundColor: C[lang],
        borderRadius: 3,
        categoryPercentage: 0.88,
        barPercentage: 0.94,
        data: files.map((f) => metricVal(valIn(e, f, lang, state.trace), relBase(e, f, state.trace), state.metric)),
      }));
      chart = new Chart(ctx, {
        type: "bar",
        data: { labels: files, datasets },
        options: baseOpts("y", log, yTitle, (v) => fmt(v)),
      });
    } else {
      sizeBox(440);
      const labels = chrono.map((i) => shortSha(suite[i]));
      const datasets = LANGS.map((lang) => ({
        label: lang,
        borderColor: C[lang], backgroundColor: C[lang], tension: 0.25, pointRadius: 3, spanGaps: true,
        data: chrono.map((i) => {
          const e = suite[i];
          return metricVal(valIn(e, state.file, lang, state.trace), relBase(e, state.file, state.trace), state.metric);
        }),
      }));
      chart = new Chart(ctx, {
        type: "line",
        data: { labels, datasets },
        options: baseOpts("x", log, yTitle, (v) => fmt(v), chrono.map((i) => suite[i])),
      });
    }
  }

  function baseOpts(valueAxis, log, yTitle, fmtFn, tlEntries) {
    const valScale = { type: log ? "logarithmic" : "linear", ticks: { color: MUTED }, grid: { color: GRID }, title: { display: true, color: MUTED, text: yTitle } };
    const catScale = {
      ticks: {
        color: MUTED, autoSkip: valueAxis === "x", font: { size: 11 },
        callback: function (v) { const s = this.getLabelForValue(v); const m = /^(.*) (\([^)]+\))$/.exec(s); return m ? [m[1], m[2]] : s; },
      },
      grid: { color: GRID },
    };
    return {
      responsive: true, maintainAspectRatio: false,
      indexAxis: valueAxis === "y" ? "y" : "x",
      scales: valueAxis === "y" ? { x: valScale, y: catScale } : { x: catScale, y: valScale },
      plugins: {
        legend: { labels: { color: getCss("--text"), boxWidth: 12, boxHeight: 12 } },
        tooltip: {
          callbacks: {
            title: (items) => {
              if (!tlEntries) return items[0].label;
              const e = tlEntries[items[0].dataIndex]; const b = branchOf(e);
              return shortSha(e) + (b ? " · " + b : "") + (dateOf(e) ? " · " + dateOf(e).toLocaleDateString() : "");
            },
            label: (i) => `${i.dataset.label}: ${i.raw == null ? "n/a" : fmtFn(i.raw)}`,
          },
        },
      },
    };
  }

  function fmt(v) { return state.metric === "us" ? v.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + " µs" : v.toFixed(2) + "×"; }

  function sizeBox(px) { document.querySelector(".chart-box").style.height = px + "px"; }

  function drawMobileSnap(e) {
    let html = "";
    for (const f of files) {
      const vals = LANGS.map((l) => metricVal(valIn(e, f, l, state.trace), relBase(e, f, state.trace), state.metric));
      const max = Math.max(...vals.filter((x) => x != null), 1);
      const t = /^(.*) (\([^)]+\))$/.exec(f);
      html += `<div class="fx"><div class="fx-title">${t ? t[1] + ' <span class="kind">' + t[2] + "</span>" : f}</div>`;
      LANGS.forEach((l, i) => {
        const v = vals[i];
        const w = v == null ? 0 : Math.max(1.5, (v / max) * 100);
        html +=
          `<div class="rowbar"><span class="rl">${l}</span>` +
          `<div class="track"><div class="fill" style="width:${w}%;background:${C[l]}"></div></div>` +
          `<span class="rv">${v == null ? "n/a" : fmt(v)}</span></div>`;
      });
      html += "</div>";
    }
    document.getElementById("mobileSnap").innerHTML = html;
  }

  function renderTable() {
    const e = state.view === "snapshot" ? suite[state.commit] : latest;
    const head = "<tr><th>fixture</th>" + LANGS.map((l) => `<th>${l}</th>`).join("") + "</tr>";
    let body = "";
    for (const f of files) {
      const cells = LANGS.map((l) => {
        const v = valIn(e, f, l, state.trace);
        if (v == null) return '<td class="na">n/a</td>';
        const us = v.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + " µs";
        if (l === "rust") return `<td>${us}</td>`;
        const base = relBase(e, f, state.trace);
        return `<td>${us}${base ? ` <span class="x">${(v / base).toFixed(2)}×</span>` : ""}</td>`;
      }).join("");
      body += `<tr><td>${f}</td>${cells}</tr>`;
    }
    document.getElementById("table").innerHTML = head + body;
  }

  function renderPicker() {
    const w = document.getElementById("pickWrap");
    if (state.view === "snapshot") {
      const opts = order.map((i) => {
        const e = suite[i], b = branchOf(e), d = dateOf(e);
        const lbl = `${shortSha(e)}${b ? " · " + b : ""}${d ? " · " + d.toLocaleDateString() : ""}`;
        return `<option value="${i}" ${i === state.commit ? "selected" : ""}>${lbl}</option>`;
      }).join("");
      w.innerHTML = `<span class="lbl">commit</span><select id="pick">${opts}</select>`;
      document.getElementById("pick").addEventListener("change", (ev) => { state.commit = +ev.target.value; update(); });
    } else {
      const opts = files.map((f) => `<option value="${f}" ${f === state.file ? "selected" : ""}>${f}</option>`).join("");
      w.innerHTML = `<span class="lbl">fixture</span><select id="pick">${opts}</select>`;
      document.getElementById("pick").addEventListener("change", (ev) => { state.file = ev.target.value; update(); });
    }
  }

  function update() { draw(); renderTable(); document.getElementById("foot").textContent = state.view === "timeline" ? "Timeline of the selected fixture across runs." : "Snapshot of the selected commit."; }

  bindSeg("view", (v) => { state.view = v; renderPicker(); update(); });
  bindSeg("trace", (v) => { state.trace = v === "1"; update(); });
  document.getElementById("metric").addEventListener("change", (e) => { state.metric = e.target.value; update(); });
  function bindSeg(id, cb) {
    const el = document.getElementById(id);
    el.addEventListener("click", (e) => {
      const b = e.target.closest("button"); if (!b) return;
      [...el.children].forEach((x) => x.classList.toggle("active", x === b));
      cb(b.dataset.v || b.dataset.t);
    });
  }

  let rt;
  window.addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(update, 150); });

  renderPicker();
  update();
})();
</script>
</body>
</html>
