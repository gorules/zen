# Any-typed value ends up written to a property → must error.
[[test]]
name = "merge([]) yields any[] and errors on write"
content = '''
{
  "blocks": [
    {
      "id": "dm",
      "type": "dataModel",
      "props": {
        "data": {
          "name": "customer",
          "properties": [
            {
              "id": "p1",
              "name": "id",
              "type": "string",
              "array": false,
              "optional": false
            }
          ]
        }
      }
    },
    {
      "id": "s1",
      "type": "expression",
      "props": {
        "data": {
          "key": "customer.mystery",
          "value": "merge([])"
        }
      }
    }
  ]
}
'''
error_codes = ["TypeMismatch"]

