# A single malformed expression must produce at most one diagnostic per
# failure mode: the real error (`+` on incompatible types) plus the `any`
# backstop — not duplicates from nested per-statement / post-merge checks.
[[test]]
name = "malformed expression emits at most one any-error alongside the real error"
content = '''
{
  "blocks": [
    {
      "id": "dm",
      "type": "dataModel",
      "props": {
        "data": {
          "name": "employee",
          "properties": [
            {
              "id": "p1",
              "name": "id",
              "type": "string",
              "array": false,
              "optional": false
            }
          ]
        }
      }
    },
    {
      "id": "s1",
      "type": "expression",
      "props": {
        "data": {
          "key": "employee.asd",
          "value": "'hello' + 123"
        }
      }
