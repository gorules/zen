# Error and warning diagnostics from all pipeline stages

# Type errors

[[test]]
name = "type error: string minus number"
expression = "a - b"
input = '{"a": "hello", "b": 5}'
reads = [
    { type = "direct", path = ["a"] },
    { type = "direct", path = ["b"] },
]

[test.loose]
return_type = '"Any"'
diagnostics = [
    { source = "type_check", severity = "error" },
]

[test.strict]
return_type = '"Any"'
diagnostics = [
    { source = "type_check", severity = "error" },
]

[[test]]
name = "type error: not on number"
expression = "not a"
input = '{"a": 5}'
reads = [
    { type = "direct", path = ["a"] },
]

[test.loose]
return_type = '"Bool"'
diagnostics = [
    { source = "type_check", severity = "error" },
]

[test.strict]
return_type = '"Bool"'
diagnostics = [
    { source = "type_check", severity = "error" },
]

