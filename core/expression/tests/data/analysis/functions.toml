# Built-in function type inference and dependency tracking

[[test]]
name = "sum function"
expression = "sum([a, b, c])"
input = '{"a": 1, "b": 2, "c": 3}'
reads = [
    { type = "direct", path = ["a"] },
    { type = "direct", path = ["b"] },
    { type = "direct", path = ["c"] },
]

[test.loose]
return_type = '"Number"'

[test.strict]
return_type = '"Number"'

