return_type = '{"Nullable": "Number"}'

[[test]]
name = "merge: Number | Nullable(Number)"
expression = "flag ? a : b"
input = '{"Object": {"flag": "Bool", "a": "Number", "b": {"Nullable": "Number"}}}'

