# Nullish coalescing

[[test]]
name = "nullish coalescing"
expression = "a ?? b"
input = '{"a": null, "b": 5}'
reads = [
    { type = "direct", path = ["a"] },
    { type = "direct", path = ["b"] },
]

[test.loose]
return_type = '"Number"'

[test.strict]
return_type = '"Number"'

# Conditional

[[test]]
name = "ternary expression"
expression = "active ? price * rate : 0"
input = '{"active": true, "price": 100, "rate": 1.5}'
reads = [
    { type = "direct", path = ["active"] },
    { type = "direct", path = ["price"] },
    { type = "direct", path = ["rate"] },
]

[test.loose]
return_type = '"Number"'

[test.strict]
return_type = '"Number"'

[[test]]
name = "ternary with string branches"
expression = "status ? 'yes' : 'no'"
input = '{"status": true}'
reads = [
    { type = "direct", path = ["status"] },
]

[test.loose]
return_type = '{"Enum":[null,["yes","no"]]}'

[test.strict]
return_type = '{"Enum":[null,["yes","no"]]}'

[[test]]
name = "nested ternary"
expression = "a > 10 ? a > 20 ? 'high' : 'mid' : 'low'"
input = '{"a": 15}'
reads = [
    { type = "direct", path = ["a"] },
    { type = "direct", path = ["a"] },
]

[test.loose]
return_type = '{"Enum":[null,["high","mid","low"]]}'

[test.strict]
return_type = '{"Enum":[null,["high","mid","low"]]}'

