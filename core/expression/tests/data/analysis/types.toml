input = '{"a": 1, "b": 2, "c": 3}'
reads = [
    { type = "direct", path = ["a"] },
    { type = "direct", path = ["b"] },
    { type = "direct", path = ["c"] },
]

[test.loose]
return_type = '{"Array":"Number"}'

[test.strict]
return_type = '{"Array":"Number"}'

[[test]]
name = "object literal with vars"
expression = "{ x: a, y: b }"
input = '{"a": 1, "b": 2}'
reads = [
    { type = "direct", path = ["a"] },
    { type = "direct", path = ["b"] },
]

[test.loose]

[test.strict]

# Template strings

[[test]]
name = "template string"
expression = '`Hello ${name}`'
input = '{"name": "world"}'
reads = [
    { type = "direct", path = ["name"] },
]

[test.loose]
return_type = '"String"'

[test.strict]
return_type = '"String"'

[[test]]
name = "template string multiple vars"
expression = '`${first} ${last}`'
input = '{"first": "John", "last": "Doe"}'
reads = [
    { type = "direct", path = ["first"] },
    { type = "direct", path = ["last"] },
]

[test.loose]
return_type = '"String"'

[test.strict]
return_type = '"String"'

# Slicing an array yields an array of the same element type (not the element).
# Indexing (`arr[i]`) is a separate node that yields the element.
[[test]]
name = "array slice yields array"
expression = "numbers[0:2]"
input = '{"numbers": [1, 2, 3]}'
reads = [
    { type = "direct", path = ["numbers"] },
]

[test.loose]
return_type = '{"Array":"Number"}'

[test.strict]
return_type = '{"Array":"Number"}'

# A slice feeding an aggregate that expects an array must type-check.
[[test]]
name = "sum over array slice"
expression = "sum(numbers[0:1])"
input = '{"numbers": [10, 20, 30]}'
reads = [
    { type = "direct", path = ["numbers"] },
]

[test.loose]
return_type = '"Number"'

[test.strict]
return_type = '"Number"'

# Empty-array branch unifies with a typed-array branch instead of widening to
# `any[]` — the empty literal carries no element constraint.
[[test]]
name = "ternary empty array unifies with typed array"
expression = "flag ? [] : [{ amount: 1 }]"
input = '{"flag": true}'

[test.loose]
return_type = '{"Array":{"Object":{"amount":"Number"}}}'

[test.strict]
return_type = '{"Array":{"Object":{"amount":"Number"}}}'
