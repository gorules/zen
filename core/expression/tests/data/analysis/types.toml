# Return type inference for basic types, arithmetic, comparisons, and logical ops

[[test]]
name = "number literal"
expression = "42"

[test.loose]
return_type = '"Number"'

[test.strict]
return_type = '"Number"'

[[test]]
name = "string literal"
expression = "'hello'"

[test.loose]
return_type = '{"Const":"hello"}'

[test.strict]
return_type = '{"Const":"hello"}'

[[test]]
name = "boolean literal"
expression = "true"

[test.loose]
return_type = '"Bool"'

[test.strict]
return_type = '"Bool"'

[[test]]
name = "null literal"
expression = "null"

[test.loose]
return_type = '"Null"'

[test.strict]
return_type = '"Null"'

# Arithmetic

[[test]]
name = "number addition"
expression = "a + b"
input = '{"a": 1, "b": 2}'
reads = [
    { type = "direct", path = ["a"] },
    { type = "direct", path = ["b"] },
]

[test.loose]
return_type = '"Number"'

[test.strict]
return_type = '"Number"'

[[test]]
